    Sound Player
  </h1>

  <div class="player-card">

    <div class="file-row">
      <label class="file-label" for="audioFile">Choose Audio File</label>
      <input type="file" id="audioFile" accept="audio/*" onchange="loadAudio()" />
      <span id="fileName">No file selected</span>
    </div>

    <audio id="audioPlayer"></audio>

    <div class="time-row">
      <span id="currentTime">0:00</span>
      <input type="range" id="seekBar" value="0" min="0" step="0.1" class="seek-bar" oninput="seek()" />
      <span id="duration">0:00</span>
    </div>

    <div class="controls-row">
      <button onclick="skipBack()">&#9664;&#9664; 10s</button>
      <button id="playPauseBtn" onclick="playPause()" disabled>&#9654; Play</button>
      <button onclick="skipForward()">10s &#9654;&#9654;</button>
    </div>

    <div class="options-row">
      <!-- Mute button: shows speaker-with-waves when sound on, speaker-with-line when muted -->
      <button id="muteBtn" onclick="toggleMute()">
        <svg id="iconUnmuted" class="btn-icon" viewBox="0 0 496 496" xmlns="http://www.w3.org/2000/svg">
          <path style="fill:#61479E;" d="M235.2,40.8c-7.2,0-14.4,4-17.6,10.4L80.8,128.8C64,123.2,44.8,120,36,120h-3.2 C15.2,120,0,134.4,0,152.8v190.4C0,361.6,15.2,376,32.8,376h2.4c8.8,0,28-3.2,44.8-8.8l136.8,77.6c3.2,6.4,10.4,10.4,18.4,10.4 c11.2,0,20.8-8.8,20.8-20V60.8C256,49.6,246.4,40.8,235.2,40.8z"/>

          <path style="fill:#82CC00;" d="M305.6,324c-4,0-8-1.6-11.2-4.8c-5.6-5.6-5.6-16,0-21.6c28-28,28-72.8,0-100 c-5.6-5.6-5.6-16,0-21.6s16-5.6,21.6,0c39.2,39.2,39.2,104,0,143.2C312.8,322.4,308.8,324,305.6,324z"/>

          <path style="fill:#82CC00;" d="M402.4,452c-4,0-8-1.6-11.2-4.8c-5.6-5.6-5.6-16,0-21.6c47.2-47.2,73.6-111.2,73.6-178.4 s-26.4-130.4-73.6-178.4c-5.6-5.6-5.6-16,0-21.6s16-5.6,21.6,0C466.4,101.6,496,172.8,496,248s-29.6,146.4-82.4,200 C410.4,450.4,406.4,452,402.4,452z"/>
        </svg>
        <span id="muteBtnLabel"> Mute</span>
      </button>

      <button id="loopBtn" onclick="toggleLoop()" class="inactive">&#8635; Loop</button>
    </div>

    <!-- Muted icon shown separately, hidden by default -->
    <div id="mutedIndicator" style="display:none; text-align:center;">
      <svg class="muted-icon" viewBox="0 0 444 444" xmlns="http://www.w3.org/2000/svg">
        <path style="fill:#61479E;" d="M250.4,5.6c-8,0-15.2,4.8-18.4,11.2l-143.2,80c-18.4-5.6-38.4-10.4-47.2-10.4h-3.2 C19.2,86.4,0,104,0,123.2v198.4c0,19.2,19.2,36.8,38.4,36.8h3.2c8.8,0,28.8-4.8,47.2-10.4l142.4,80c3.2,6.4,11.2,10.4,19.2,10.4 c11.2,0,21.6-9.6,21.6-20.8v-392C272,15.2,261.6,5.6,250.4,5.6z"/>

        <path style="fill:#9B0F00;" d="M444,214.4H296.8c0,3.2,2.4,7.2,4.8,9.6c3.2,3.2,7.2,6.4,11.2,6.4H428C436,230.4,444,224,444,214.4z"/>
      </svg>
      <span style="font-size:13px; opacity:0.6;">Muted</span>
    </div>

    <div class="slider-row">
      <label>Volume</label>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" oninput="changeVolume()" />
      <span id="volumeDisplay">100%</span>
    </div>

    <div class="slider-row">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="0.5" max="2" step="0.25" value="1" oninput="changeSpeed()" />
      <span id="speedDisplay">1x</span>
    </div>

    <p class="hint">Keyboard: <kbd>Space</kbd> play/pause &nbsp; <kbd>M</kbd> mute &nbsp; <kbd>L</kbd> loop &nbsp; <kbd>&#8592;</kbd><kbd>&#8594;</kbd> skip</p>

  </div>

  <script src="index.js"></script>
</body>
</html>
